<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Vertex Web SDK</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f5f7fb 0%, #ffffff 100%);
        color: #132238;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
      }

      .links {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border: 1px solid #d8e1ec;
        border-radius: 12px;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: #9ab3cf;
        background: #f8fbff;
      }

      strong {
        display: block;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vertex Web SDK</h1>
      <p>
        Development entry points for the repository when running
        <code>yarn examples:start</code>.
      </p>
      <div class="links">
        <a href="/examples/">
          <strong>Examples</strong>
          Browse the example pages served by Vite.
        </a>
        <a href="/docs/">
          <strong>Docs</strong>
          Open the generated documentation site if present.
        </a>
      </div>
    </main>
  </body>
</html>
