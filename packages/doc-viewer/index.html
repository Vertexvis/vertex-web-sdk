<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>

    <link rel="stylesheet" href="/dist/doc-viewer/doc-viewer.css" />
    <script type="module" src="/dist/doc-viewer/doc-viewer.esm.js"></script>
    <script nomodule src="/dist/doc-viewer.js"></script>

    <style>
      html,
      body {
        font-family: Roboto, Arial, Helvetica, sans-serif;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
      }

      .app {
        display: flex;
        width: 100%;
        height: 100%;
      }

      vertex-document-viewer {
        width: 100%;
        height: 100%;
      }

      #layers-sidebar {
        display: flex;
        flex-direction: column;
        width: 200px;
        height: 100%;
        background-color: #eeeeee;
        border-right: 1px solid #cccccc;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .layer.enabled {
        background-color: #4db8db;
      }

      .layer {
        white-space: nowrap;
        background-color: #cccccc;
      }

      svg {
        fill: currentColor;
      }

      .toolbar {
        display: flex;
        gap: 1rem;
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background-color: #eeeeee;
        padding: 0.25rem;
        border-radius: 0.5rem;
      }

      .toolbar-button {
        background-color: transparent;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 0.5rem;
        border-radius: 0.25rem;
        color: #777777;
      }

      .toolbar-button.enabled {
        color: #4db8db;
      }

      .controls {
        display: flex;
        gap: 1rem;
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
    </style>

    <script type="module">
      async function main() {
        await window.customElements.whenDefined('vertex-document-viewer');

        const documentViewer = document.querySelector('vertex-document-viewer');
        const modeButton = document.getElementById('interaction-mode-toggle');
        const zoomInButton = document.getElementById('zoom-in-button');
        const zoomOutButton = document.getElementById('zoom-out-button');
        const loadNextPageButton = document.getElementById('load-next-page');
        const loadPreviousPageButton = document.getElementById('load-previous-page');
        const layersSidebar = document.getElementById('layers-sidebar');

        modeButton.addEventListener('click', () => {
          const updatedInteractionMode = documentViewer.interactionMode === 'pan' ? 'none' : 'pan';
          documentViewer.interactionMode = updatedInteractionMode;

          if (updatedInteractionMode === 'pan') {
            modeButton.classList.add('enabled');
          } else {
            modeButton.classList.remove('enabled');
          }
        });

        zoomInButton.addEventListener('click', () => {
          documentViewer.zoomTo(documentViewer.documentState.zoomPercentage + 10);
        });

        zoomOutButton.addEventListener('click', () => {
          documentViewer.zoomTo(documentViewer.documentState.zoomPercentage - 10);
        });

        loadNextPageButton.addEventListener('click', async () => {
          await documentViewer.loadPage(documentViewer.documentState.loadedPageNumber + 1);
        });
        loadPreviousPageButton.addEventListener('click', async () => {
          await documentViewer.loadPage(documentViewer.documentState.loadedPageNumber - 1);
        });

        documentViewer.addEventListener('documentReady', () => {
          if (documentViewer.layers.enabled) {
            documentViewer.layers.getLayers().then(layers => {
              layers.forEach(layer => {
                const layerElement = document.createElement('div');

                layerElement.classList.add('layer')
                layerElement.textContent = layer.name;
                layerElement.addEventListener('click', () => {
                  const updatedVisible = !layerElement.classList.contains('enabled');

                  console.log('updatedVisible', updatedVisible);

                  documentViewer.layers.setLayerVisibility(layer.id, updatedVisible);

                  if (updatedVisible) {
                    layerElement.classList.add('enabled');
                  } else {
                    layerElement.classList.remove('enabled');
                  }
                });

                if (layer.visible) {
                  layerElement.classList.add('enabled');
                }

                layersSidebar.appendChild(layerElement);
              });
            });
          } else {
            layersSidebar.style.display = 'none';
          }
        });
      }


      window.addEventListener('DOMContentLoaded', main);
    </script>
