name: Master

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v4
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: "Install"
        run: "yarn install --frozen-lockfile"
      - name: "Build"
        run: "yarn build"
      - name: "Test"
        run: "yarn test:ci"
      - name: "Upload build artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            packages/*/dist
            packages/viewer/loader

  detect-publish-release:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.detect-publish.outputs.publish }}
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v4
      - name: "Detect publish"
        id: "detect-publish"
        run: |
          result=`./scripts/detect_release.sh`
          echo $result
          echo "publish=$result" >> "$GITHUB_OUTPUT"

  publish-canary:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v4
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: packages
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: https://registry.npmjs.org
          scope: "@vertexvis"
      - name: "Install"
        run: "yarn install"
      - name: "Publish Canary to NPM"
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPMJS_ACCESS_TOKEN }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          ./scripts/publish_canary.sh

  publish-release:
    runs-on: ubuntu-latest
    needs: [build, detect-publish-release, publish-canary]
    if: needs.detect-publish-release.outputs.publish == 1
    permissions:
      contents: write
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v4
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: packages
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: https://registry.npmjs.org
          scope: "@vertexvis"
      - name: "Install"
        run: "yarn install"
      - name: "Publish Release to NPM"
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPMJS_ACCESS_TOKEN }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: "./scripts/publish_release.sh"

  docs:
    runs-on: ubuntu-latest
    needs: [publish-release]
    permissions:
      contents: write
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v4
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: packages
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: https://registry.npmjs.org
          scope: "@vertexvis"
      - name: "Install"
        run: "yarn install"
      - name: "Generate docs"
        run: "yarn generate:docs"
      - name: "Publish docs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -f docs/
          git commit -m "new docs"
          git push -f origin HEAD:gh-pages
