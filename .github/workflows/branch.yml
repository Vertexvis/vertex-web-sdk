name: Branch

on:
  push:
    branches-ignore:
      - master
      - publish-testing

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v6
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: "Install"
        run: "yarn install --frozen-lockfile"
      - name: "Build"
        run: "yarn build"
      - name: "Upload build artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: |
            packages/*/dist
            packages/viewer/loader
            packages/doc-viewer/loader
            packages/doc-viewer/assets
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v6
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: "Install"
        run: "yarn install"
      - name: "Lint"
        run: "yarn lint"
  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v6
      - name: "Download build artifacts"
        uses: actions/download-artifact@v5
        with:
          name: build-artifact
          path: packages
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: "Install"
        run: "yarn install"
      - name: "Test"
        run: "yarn test:ci"
  docs:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: "Checkout changes"
        uses: actions/checkout@v6
      - name: "Download build artifacts"
        uses: actions/download-artifact@v5
        with:
          name: build-artifact
          path: packages
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: "Install"
        run: "yarn install"
      - name: "Generate docs"
        run: "yarn generate:docs"
      - name: "Test docs"
        run: git add -f docs/
