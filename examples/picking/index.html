<!doctype html>
<html lang="en" xml:lang="en">
  <head>
    <title>Picking</title>

    <script type="module" src="main.js"></script>

    <!--
      Default: use the published package from the CDN.
      To test in-development viewer changes instead, comment this section out and
      uncomment the local assets section below.
    -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@vertexvis/viewer@0.24.x/dist/viewer/viewer.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@vertexvis/viewer@0.24.x/dist/viewer/viewer.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@vertexvis/viewer@0.24.x/dist/viewer.cjs"
    ></script>

    <!--
      Local development: use the local viewer build output instead of the CDN.
      Do `yarn workspace @vertexvis/viewer build` and `yarn examples:start`
      before enabling this block.
    -->

    <!--
    <link rel="stylesheet" href="/packages/viewer/dist/viewer/viewer.css" />
    <script type="module" src="/packages/viewer/dist/viewer/viewer.js"></script>
    -->

    <style>
      html,
      body {
        font-family: Roboto, Arial, Helvetica, sans-serif;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      #viewer {
        display: flex;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="heading">Picking Instructions</h1>
      <ul>
        <li>
          Click a part to select it. Click the part again to select its parent.
        </li>
        <li>
          Hold 'shift' while selecting a part to maintain the current selection
          while selecting the new part.
        </li>
        <li>
          Press the spacebar or click in the empty space to deselect all parts.
        </li>
      </ul>
      <vertex-viewer
        id="viewer"
        class="viewer"
        src="urn:vertex:stream-key:ydD87RtDdJCZQaa6twueZTEtsciQmAWl5qnP"
      >
        <vertex-viewer-default-toolbar
          data-viewer="viewer"
          placement="top-left"
        ></vertex-viewer-default-toolbar>
      </vertex-viewer>
    </div>
  </body>
</html>
